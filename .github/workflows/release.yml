name: "Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Smart Quiz App v__VERSION__"
          releaseBody: "这是智能刷题客户端的最新版本。包含了 EXE 安装包、免安装 Zip 压缩包以及安卓端 APK 包。"
          releaseDraft: false
          prerelease: false

      - name: Create Portable Zip
        run: |
          Compress-Archive -Path src-tauri/target/release/smart-quiz-app.exe -DestinationPath smart-quiz-app-portable.zip

      - name: Upload Portable Zip to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          gh release upload "v$VERSION" smart-quiz-app-portable.zip --clobber

  build-android:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --info > gradle_build.log 2>&1 || (cat gradle_build.log && exit 1)
          cd ..

      - name: Upload Android APK as Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Gradle Logs (If Failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: android/gradle_build.log

      - name: Upload Android APK to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/debug/app-debug.apk ./smart-quiz-app-v${VERSION}.apk || echo "APK File Missing!"
          gh release upload "v${VERSION}" ./smart-quiz-app-v${VERSION}.apk --clobber || echo "Release upload failed, but artifact is available."
