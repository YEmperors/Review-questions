name: "Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Smart Quiz App v__VERSION__"
          releaseBody: "这是智能刷题客户端的最新版本。包含了 EXE 安装包和绿色的免安装 Zip 压缩包。"
          releaseDraft: false
          prerelease: false

      - name: Create Portable Zip
        run: |
          Compress-Archive -Path src-tauri/target/release/smart-quiz-app.exe -DestinationPath smart-quiz-app-portable.zip

      - name: Upload Portable Zip to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          gh release upload "v$VERSION" smart-quiz-app-portable.zip --clobber

      - name: Setup Java JDK for Android build
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          npm run build
          npx cap sync
          cd android
          .\gradlew.bat assembleDebug
          cd ..

      - name: Upload Android APK to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          Copy-Item -Path android/app/build/outputs/apk/debug/app-debug.apk -Destination smart-quiz-app-v$VERSION.apk
          gh release upload "v$VERSION" smart-quiz-app-v$VERSION.apk --clobber
